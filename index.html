<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Avcısı PRO</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    background:linear-gradient(135deg,#10131f,#1f2a44,#40295f);
    min-height:100vh;
    color:#fff;
    padding:18px;
}
.container{max-width:1200px;margin:auto}
.hero{
    text-align:center;
    padding:28px 15px;
}
.hero h1{
    font-size:34px;
    margin-bottom:8px;
}
.hero p{
    opacity:.85;
    font-size:16px;
}
.glass{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.18);
    border-radius:24px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}
.section-title{
    font-size:22px;
    margin-bottom:15px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:14px;
}
input,select{
    width:100%;
    padding:14px;
    border-radius:15px;
    border:1px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.92);
    color:#111;
    font-size:16px;
}
label{
    font-size:13px;
    opacity:.85;
    margin-bottom:6px;
    display:block;
}
.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    font-size:16px;
    font-weight:700;
    margin-top:10px;
    cursor:pointer;
    color:#fff;
    background:linear-gradient(135deg,#00c853,#00b0ff);
}
.btn.secondary{
    background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.25);
}
.btn.danger{
    background:linear-gradient(135deg,#ff416c,#ff4b2b);
}
.market-row{
    background:rgba(255,255,255,.10);
    padding:14px;
    border-radius:18px;
    margin-bottom:12px;
}
.market-name-badge{
    display:inline-block;
    padding:7px 12px;
    border-radius:999px;
    background:rgba(255,255,255,.18);
    margin-bottom:10px;
    font-weight:700;
}
.results{
    display:none;
}
.result-card{
    background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.18);
    border-radius:20px;
    padding:18px;
    margin-bottom:14px;
}
.best{
    border:2px solid #00e676;
    background:linear-gradient(135deg,rgba(0,230,118,.25),rgba(0,176,255,.20));
}
.price{
    font-size:30px;
    font-weight:900;
    margin-top:8px;
}
.small{
    opacity:.78;
    font-size:14px;
    margin-top:5px;
}
.badge{
    display:inline-block;
    padding:7px 12px;
    border-radius:999px;
    background:#00c853;
    color:white;
    font-size:13px;
    font-weight:800;
    margin-bottom:8px;
}
.saving{
    margin-top:8px;
    color:#00ff9d;
    font-weight:800;
}
.list-item{
    display:flex;
    justify-content:space-between;
    gap:10px;
    padding:12px;
    border-radius:15px;
    background:rgba(255,255,255,.10);
    margin-bottom:8px;
}
.tabs{
    display:flex;
    gap:8px;
    margin-bottom:15px;
}
.tab{
    flex:1;
    padding:12px;
    border-radius:14px;
    background:rgba(255,255,255,.12);
    text-align:center;
    font-weight:800;
    cursor:pointer;
}
.tab.active{
    background:linear-gradient(135deg,#00c853,#00b0ff);
}
.hidden{display:none}
.footer-note{
    text-align:center;
    opacity:.6;
    font-size:12px;
    margin-top:25px;
}
@media(max-width:700px){
    .hero h1{font-size:28px}
    .price{font-size:26px}
}
</style>
</head>

<body>
<div class="container">

    <div class="hero">
        <h1>🛒 Market Avcısı PRO</h1>
        <p>Ürün, gramaj ve market fiyatlarını karşılaştır. En ucuz sepeti bul.</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab('single')">Tek Ürün</div>
        <div class="tab" onclick="showTab('basket')">Sepet</div>
    </div>

    <!-- TEK ÜRÜN -->
    <div id="singleTab">
        <div class="glass">
            <h2 class="section-title">🔍 Ürün Bilgisi</h2>

            <div class="grid">
                <div>
                    <label>Ürün Adı</label>
                    <input id="productName" placeholder="Örn: Süt, Yağ, Kahve">
                </div>
                <div>
                    <label>Barkod / Kod</label>
                    <input id="barcode" placeholder="İsteğe bağlı">
                </div>
                <div>
                    <label>Birim</label>
                    <select id="unitType">
                        <option value="g">Gram / Kilogram</option>
                        <option value="ml">ML / Litre</option>
                        <option value="adet">Adet</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="glass">
            <h2 class="section-title">🏪 Market Fiyatları</h2>
            <div id="marketRows"></div>

            <button class="btn secondary" onclick="addMarketRow()">+ Market Ekle</button>
            <button class="btn" onclick="compareSingle()">Karşılaştır</button>
            <button class="btn danger" onclick="clearSingle()">Temizle</button>
        </div>

        <div class="glass results" id="singleResults">
            <h2 class="section-title">📊 Sonuçlar</h2>
            <div id="singleResultList"></div>
        </div>
    </div>

    <!-- SEPET -->
    <div id="basketTab" class="hidden">
        <div class="glass">
            <h2 class="section-title">🧺 Sepete Ürün Ekle</h2>

            <div class="grid">
                <div>
                    <label>Ürün</label>
                    <input id="basketProduct" placeholder="Örn: Süt">
                </div>
                <div>
                    <label>Market</label>
                    <select id="basketMarket">
                        <option>Migros</option>
                        <option>A101</option>
                        <option>BİM</option>
                        <option>Şok</option>
                        <option>CarrefourSA</option>
                        <option>Hakmar</option>
                        <option>Diğer</option>
                    </select>
                </div>
                <div>
                    <label>Fiyat ₺</label>
                    <input id="basketPrice" type="number" step="0.01" placeholder="0.00">
                </div>
            </div>

            <button class="btn" onclick="addBasketItem()">Sepete Ekle</button>
            <button class="btn danger" onclick="clearBasket()">Sepeti Temizle</button>
        </div>

        <div class="glass">
            <h2 class="section-title">📦 Sepet Listesi</h2>
            <div id="basketList"></div>
        </div>

        <div class="glass results" id="basketResults">
            <h2 class="section-title">🏆 En Uygun Market Sepeti</h2>
            <div id="basketResultList"></div>
        </div>
    </div>

    <div class="footer-note">
        Market Avcısı PRO — fiyatları elle girerek gerçek zamanlı karşılaştırma yapar.
    </div>

</div>

<script>
let basket = [];

const defaultMarkets = ["Migros","A101","BİM","Şok","CarrefourSA"];

window.onload = function(){
    defaultMarkets.forEach(m => addMarketRow(m));
};

function showTab(tab){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    if(tab === "single"){
        document.querySelectorAll(".tab")[0].classList.add("active");
        document.getElementById("singleTab").classList.remove("hidden");
        document.getElementById("basketTab").classList.add("hidden");
    }else{
        document.querySelectorAll(".tab")[1].classList.add("active");
        document.getElementById("basketTab").classList.remove("hidden");
        document.getElementById("singleTab").classList.add("hidden");
    }
}

function addMarketRow(name=""){
    const div = document.createElement("div");
    div.className = "market-row";
    div.innerHTML = `
        <span class="market-name-badge">🏪 Market</span>
        <div class="grid">
            <div>
                <label>Market Adı</label>
                <input class="mName" value="${name}" placeholder="Market adı">
            </div>
            <div>
                <label>Fiyat ₺</label>
                <input class="mPrice" type="number" step="0.01" placeholder="0.00">
            </div>
            <div>
                <label>Miktar</label>
                <input class="mQty" type="number" step="0.01" placeholder="Örn: 1000">
            </div>
        </div>
    `;
    document.getElementById("marketRows").appendChild(div);
}

function compareSingle(){
    const product = document.getElementById("productName").value.trim();
    const unit = document.getElementById("unitType").value;
    const rows = document.querySelectorAll(".market-row");

    if(!product){
        alert("Ürün adı gir.");
        return;
    }

    let data = [];

    rows.forEach(row=>{
        const name = row.querySelector(".mName").value.trim();
        const price = parseFloat(row.querySelector(".mPrice").value);
        const qty = parseFloat(row.querySelector(".mQty").value);

        if(name && price > 0){
            let unitPrice = price;

            if(qty > 0){
                if(unit === "g" || unit === "ml"){
                    unitPrice = price / qty * 1000;
                }else{
                    unitPrice = price / qty;
                }
            }

            data.push({
                name,
                price,
                qty: qty || null,
                unitPrice
            });
        }
    });

    if(data.length < 2){
        alert("Karşılaştırma için en az 2 market fiyatı gir.");
        return;
    }

    data.sort((a,b)=>a.unitPrice-b.unitPrice);

    const best = data[0];
    const list = document.getElementById("singleResultList");
    list.innerHTML = "";

    data.forEach((item,index)=>{
        const diff = item.unitPrice - best.unitPrice;
        const percent = diff > 0 ? ((diff / item.unitPrice) * 100).toFixed(1) : 0;

        let unitText = "adet";
        if(unit === "g") unitText = "kg";
        if(unit === "ml") unitText = "litre";

        const card = document.createElement("div");
        card.className = "result-card " + (index === 0 ? "best" : "");
        card.innerHTML = `
            ${index === 0 ? '<div class="badge">🏆 EN UYGUN</div>' : ""}
            <h3>${item.name}</h3>
            <div class="small">${product} ${item.qty ? "— " + item.qty + " " + unit : ""}</div>
            <div class="price">${item.price.toFixed(2)} ₺</div>
            <div class="small">Birim fiyat: ${item.unitPrice.toFixed(2)} ₺ / ${unitText}</div>
            ${diff > 0 ? `<div class="saving">Bu seçenek ${diff.toFixed(2)} ₺ / ${unitText} daha pahalı. En ucuzla fark: %${percent}</div>` : ""}
        `;
        list.appendChild(card);
    });

    document.getElementById("singleResults").style.display = "block";
    document.getElementById("singleResults").scrollIntoView({behavior:"smooth"});
}

function clearSingle(){
    document.getElementById("productName").value = "";
    document.getElementById("barcode").value = "";
    document.getElementById("marketRows").innerHTML = "";
    defaultMarkets.forEach(m => addMarketRow(m));
    document.getElementById("singleResults").style.display = "none";
}

function addBasketItem(){
    const product = document.getElementById("basketProduct").value.trim();
    const market = document.getElementById("basketMarket").value;
    const price = parseFloat(document.getElementById("basketPrice").value);

    if(!product || !(price > 0)){
        alert("Ürün ve fiyat gir.");
        return;
    }

    basket.push({product, market, price});
    document.getElementById("basketProduct").value = "";
    document.getElementById("basketPrice").value = "";

    renderBasket();
    compareBasket();
}

function renderBasket(){
    const list = document.getElementById("basketList");
    list.innerHTML = "";

    if(basket.length === 0){
        list.innerHTML = '<div class="small">Henüz ürün eklenmedi.</div>';
        return;
    }

    basket.forEach((item,index)=>{
        const div = document.createElement("div");
        div.className = "list-item";
        div.innerHTML = `
            <div>
                <strong>${item.product}</strong>
                <div class="small">${item.market}</div>
            </div>
            <div>
                <strong>${item.price.toFixed(2)} ₺</strong>
                <button onclick="removeBasketItem(${index})" style="margin-left:8px;border:none;border-radius:8px;padding:6px;background:#ff4b2b;color:white;">Sil</button>
            </div>
        `;
        list.appendChild(div);
    });
}

function removeBasketItem(index){
    basket.splice(index,1);
    renderBasket();
    compareBasket();
}

function compareBasket(){
    const totals = {};

    basket.forEach(item=>{
        if(!totals[item.market]) totals[item.market] = 0;
        totals[item.market] += item.price;
    });

    const entries = Object.entries(totals).sort((a,b)=>a[1]-b[1]);
    const resultBox = document.getElementById("basketResults");
    const resultList = document.getElementById("basketResultList");

    if(entries.length === 0){
        resultBox.style.display = "none";
        return;
    }

    resultBox.style.display = "block";
    resultList.innerHTML = "";

    const best = entries[0];

    entries.forEach(([market,total],index)=>{
        const diff = total - best[1];

        const div = document.createElement("div");
        div.className = "result-card " + (index === 0 ? "best" : "");
        div.innerHTML = `
            ${index === 0 ? '<div class="badge">🏆 EN UCUZ SEPET</div>' : ""}
            <h3>${market}</h3>
            <div class="price">${total.toFixed(2)} ₺</div>
            ${diff > 0 ? `<div class="saving">${best[0]} marketine göre ${diff.toFixed(2)} ₺ daha pahalı</div>` : ""}
        `;
        resultList.appendChild(div);
    });
}

function clearBasket(){
    basket = [];
    renderBasket();
    document.getElementById("basketResults").style.display = "none";
}

renderBasket();
</script>
</body>
</html>
